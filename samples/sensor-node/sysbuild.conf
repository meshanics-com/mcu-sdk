# Build + flash MCUboot alongside the app, so the agent runs as a swappable A/B
# image and can confirm/revert OTA updates.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
# Revertable A/B swap (NOT overwrite-only). The Espressif port defaults this
# choice to overwrite-only, which makes the agent's "test" swap permanent - a
# non-confirming image then boot-loops instead of rolling back. Swap-using-move
# needs no scratch partition and restores true auto-rollback.
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
